<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RHODES TERMINAL / 文风转换</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="hero-panel" aria-labelledby="page-title">
        <div class="panel-marker">SYS-PRTS / CN-TEXT TRANSFORM</div>
        <div class="hero-grid">
          <div>
            <p class="eyebrow"><span></span>RHODES ISLAND COMMUNICATION NODE</p>
            <h1 id="page-title">罗德岛式文风转换终端</h1>
            <p class="brief">输入一句普通表达，终端会将其重构为更明日方舟式的中文。</p>
          </div>
          <div class="status-board-wrap">
            <button class="settings-trigger" type="button" id="settingsButton" aria-expanded="false" aria-controls="settingsPanel" title="配置">
              <span aria-hidden="true">⚙</span>
              <span class="sr-only">配置</span>
            </button>
            <div class="settings-panel" id="settingsPanel" hidden>
              <div class="settings-head">
                <span>CONFIG</span>
                <strong>API</strong>
              </div>
              <form id="settingsForm">
                <label class="settings-field" for="apiUrlInput">
                  <span>API URL</span>
                  <input id="apiUrlInput" name="apiBaseUrl" type="url" autocomplete="off" spellcheck="false">
                </label>
                <label class="settings-field" for="apiKeyInput">
                  <span>API Key</span>
                  <input id="apiKeyInput" name="apiKey" type="password" autocomplete="off" spellcheck="false">
                </label>
                <label class="settings-field" for="modelInput">
                  <span>Model</span>
                  <input id="modelInput" name="model" type="text" autocomplete="off" spellcheck="false">
                </label>
                <div class="settings-actions">
                  <button class="copy-button" type="button" id="resetSettingsButton">默认</button>
                  <button class="text-button" type="submit">保存</button>
                </div>
                <p class="settings-status" id="settingsStatus"></p>
              </form>
            </div>
            <div class="status-board" aria-label="终端状态">
              <div><span>API</span><strong>ONLINE</strong></div>
              <div><span>FORMAT</span><strong>CHAT</strong></div>
              <div><span>MODE</span><strong>STYLE</strong></div>
            </div>
          </div>
        </div>
      </section>

      <section class="workspace" aria-label="转换工作区">
        <form class="converter" id="converterForm">
          <div class="module-head">
            <div>
              <span class="module-code">INPUT-01</span>
              <h2>原始通信</h2>
            </div>
            <span class="signal-dot"></span>
          </div>

          <label class="field-label" for="inputText">待转换文本</label>
          <textarea id="inputText" name="inputText" maxlength="4000" placeholder="例如：今天的事情很多，但我会尽力处理完。"></textarea>
          <div class="meta-row">
            <span id="charCount">0 / 4000</span>
            <button class="text-button" type="button" id="sampleButton">载入样例</button>
          </div>

          <div class="control-grid">
            <div class="control-block persona-control">
              <span>语气预设</span>
              <input class="persona-search" id="personaSearchInput" type="search" placeholder="搜索干员、阵营、职业或标签" autocomplete="off">
              <div class="persona-filters" aria-label="语气分类筛选">
                <button class="persona-filter is-active" type="button" data-filter="all">全部</button>
                <button class="persona-filter" type="button" data-filter="base">通用</button>
                <button class="persona-filter" type="button" data-filter="operator">干员</button>
              </div>
              <div class="persona-current" id="personaCurrent">罗德岛终端</div>
              <div class="persona-results" id="personaResults" role="listbox" aria-label="语气预设结果"></div>
              <select class="sr-only" id="personaSelect" name="persona" aria-hidden="true" tabindex="-1"></select>
            </div>
            <label class="control-block" for="intensityRange">
              <span>风格强度 <b id="intensityValue">65</b></span>
              <input id="intensityRange" name="intensity" type="range" min="10" max="100" value="65">
            </label>
          </div>

          <button class="primary-action" type="submit" id="submitButton">
            <span>执行转换</span>
            <small>DEPLOY</small>
          </button>
        </form>

        <section class="output-panel" aria-live="polite">
          <div class="module-head">
            <div>
              <span class="module-code">OUTPUT-02</span>
              <h2>转换结果</h2>
            </div>
            <button class="copy-button" type="button" id="copyButton" disabled>复制</button>
          </div>
          <div class="result-box" id="resultBox">
            <p class="placeholder">等待输入。终端将返回重构后的通信文本。</p>
          </div>
          <div class="output-intel">
            <section class="intel-block" aria-label="当前语气档案">
              <div class="intel-title"><span>STYLE PROFILE</span><strong id="profileName">罗德岛终端</strong></div>
              <div class="intel-grid" id="profileDetails"></div>
              <div class="tag-row" id="profileTags"></div>
            </section>
            <section class="intel-block" aria-label="请求参数摘要">
              <div class="intel-title"><span>REQUEST</span><strong id="requestEndpoint">LOCAL</strong></div>
              <div class="intel-grid" id="requestDetails"></div>
            </section>
          </div>
          <div class="error-line" id="errorLine" role="alert"></div>
        </section>
      </section>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
